<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English PET Quiz Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .quiz-container { max-width: 750px; margin: 40px auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .option-btn { margin-bottom: 15px; text-align: left; padding: 18px; transition: all 0.2s; border: 2px solid #f1f3f5; border-radius: 12px; background: #fff; width: 100%; }
        .option-btn:hover { background-color: #f8f9fa; border-color: #dee2e6; transform: translateY(-2px); }
        .correct { background-color: #d1e7dd !important; border-color: #a3cfbb !important; color: #0a3622; font-weight: 600; }
        .wrong { background-color: #f8d7da !important; border-color: #f1aeb5 !important; color: #58151c; }
        #feedback { display: none; padding: 20px; border-radius: 12px; margin-top: 25px; border-left: 6px solid #0d6efd; background: #f0f7ff; }
        .progress { height: 12px; border-radius: 10px; margin-bottom: 25px; background-color: #e9ecef; }
        .history-box { max-height: 250px; overflow-y: auto; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="quiz-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-dark mb-0">English PET Quiz</h3>
            <span class="badge rounded-pill bg-dark px-3 py-2" id="level-badge">LEVEL</span>
        </div>

        <div class="progress">
            <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%"></div>
        </div>

        <div id="quiz-box">
            <h5 id="question-text" class="mb-4 lh-base text-secondary">Đang tải nội dung câu hỏi...</h5>
            <div id="options-container">
                </div>
            
            <div id="feedback">
                <div class="d-flex align-items-center">
                    <span class="me-2">📝</span>
                    <strong>Giải thích chi tiết:</strong>
                </div>
                <p id="note-text" class="mt-2 mb-0 text-muted small"></p>
            </div>
        </div>

        <div id="result-box" class="text-center" style="display: none;">
            <div class="display-1 mb-3">🎯</div>
            <h2 class="fw-bold">Kết quả bài làm</h2>
            <p class="fs-4">Bạn đạt được: <span class="text-primary fw-bold" id="final-score">0</span> / 300 câu</p>
            <button class="btn btn-dark btn-lg px-5 mt-3 rounded-pill" onclick="location.reload()">Thử sức lại</button>
        </div>
    </div>

    <div class="quiz-container mt-0 mb-5">
        <h5 class="mb-3 d-flex align-items-center">
            <span class="me-2">📈</span> Lịch sử điểm số gần đây
        </h5>
        <div class="history-box">
            <ul id="history-list" class="list-group list-group-flush">
                <li class="list-group-item text-center py-4 text-muted">Đang truy xuất dữ liệu...</li>
            </ul>
        </div>
    </div>
</div>

<script>
    let questions = [];
    let currentIdx = 0;
    let score = 0;

    // --- Xử lý Lịch sử ---
    function loadHistory() {
        fetch('/api/get-history')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('history-list');
                if (!data || data.length === 0) {
                    list.innerHTML = '<li class="list-group-item text-center py-3">Chưa có bản ghi nào được tìm thấy.</li>';
                    return;
                }
                list.innerHTML = data.reverse().map(item => 
                    `<li class="list-group-item d-flex justify-content-between align-items-center py-3">
                        <span class="text-dark small fw-medium">${item}</span>
                        <i class="text-success small">✓ Verified</i>
                    </li>`
                ).join('');
            }).catch(err => console.error("Lỗi load lịch sử:", err));
    }

    // --- Khởi tạo dữ liệu ---
    fetch('/api/questions')
        .then(res => res.json())
        .then(data => {
            questions = data; 
            showQuestion();
            loadHistory();
        });

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById("question-text").innerText = `${currentIdx + 1}. ${q.question}`;
        document.getElementById("level-badge").innerText = q.level;
        document.getElementById("feedback").style.display = "none";
        
        const progress = ((currentIdx) / questions.length) * 100;
        document.getElementById("progress-bar").style.width = progress + "%";

        const container = document.getElementById("options-container");
        container.innerHTML = "";
        
        const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);

        shuffledOptions.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, btn, q.options[q.answer]);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn, correct) {
        const btns = document.querySelectorAll(".option-btn");
        const feedback = document.getElementById("feedback");
        const noteText = document.getElementById("note-text");

        btns.forEach(b => b.disabled = true);

        if (selected === correct) {
            btn.classList.add("correct");
            score++;
        } else {
            btn.classList.add("wrong");
            btns.forEach(b => {
                if(b.innerText === correct) b.classList.add("correct");
            });
        }

        noteText.innerText = questions[currentIdx].note;
        feedback.style.display = "block";

        setTimeout(() => {
            currentIdx++;
            if (currentIdx < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }, 3000);
    }

    function showResult() {
        document.getElementById("quiz-box").style.display = "none";
        document.getElementById("result-box").style.display = "block";
        document.getElementById("final-score").innerText = score;

        fetch('/api/save-score', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ score: score, total: questions.length }),
        })
        .then(() => loadHistory())
        .catch(err => console.error("Lỗi lưu điểm:", err));
    }
</script>

</body>
</html>
